# ============================================
# 山海径 shanghaijing-web Nginx 配置
# 适用：宝塔面板 → 网站 → 设置 → 配置文件
# 把下面内容替换到 server 块中
# ============================================

server {
    listen 80;
    listen 443 ssl http2;
    server_name your-domain.com;  # ← 改成你的域名

    # SSL 证书（宝塔会自动生成这两行，不要手动改）
    # ssl_certificate     /www/server/panel/vhost/cert/your-domain.com/fullchain.pem;
    # ssl_certificate_key /www/server/panel/vhost/cert/your-domain.com/privkey.pem;

    root /www/wwwroot/shanghaijing-web/apps/web/dist;
    index index.html;

    # ----- 日志（可选）-----
    access_log /www/wwwlogs/shanghaijing-access.log;
    error_log  /www/wwwlogs/shanghaijing-error.log;

    # ----- Gzip 压缩 -----
    gzip on;
    gzip_min_length 1k;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml text/javascript image/svg+xml;
    gzip_vary on;
    gzip_disable "MSIE [1-6]\.";

    # ----- 上传文件（静态直出）-----
    location /uploads/ {
        alias /www/wwwroot/shanghaijing-web/apps/api/public/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----- 静态资源缓存 -----
    location /assets/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # ----- API 反向代理 -----
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE / 长连接支持（Live2D 聊天）
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;

        # 上传大小限制
        client_max_body_size 12m;
    }

    # ----- SPA 路由：所有非文件请求回退到 index.html -----
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ----- 安全加固 -----
    location ~ /\. {
        deny all;
        access_log off;
    }
}
